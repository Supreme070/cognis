<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | Cognis Group</title>
  <meta name="description" content="That Cognis Group page couldn't be found. Head to the homepage, services, or blog to find what you need." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://cognis.group/404" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <meta name="theme-color" content="#0A0A0A" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0A0A0A;
      color: #F5F5F5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
      line-height: 1.5;
    }
    main { max-width: 560px; text-align: center; }
    .code {
      font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase;
      color: #A3A3A3; margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 600; margin: 0 0 16px;
      letter-spacing: -0.02em;
    }
    p { color: #C8C8C8; font-size: 17px; margin: 0 0 32px; }
    .links {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    }
    a.btn {
      display: inline-block;
      padding: 12px 22px; border-radius: 999px;
      text-decoration: none; font-weight: 500; font-size: 15px;
      border: 1px solid #2A2A2A; color: #F5F5F5;
      transition: background 0.15s, border-color 0.15s;
    }
    a.btn:hover { background: #1A1A1A; border-color: #3A3A3A; }
    a.btn.primary { background: #F5F5F5; color: #0A0A0A; border-color: #F5F5F5; }
    a.btn.primary:hover { background: #E5E5E5; }
    .tag { margin-top: 40px; color: #6B6B6B; font-size: 13px; font-style: italic; }
  </style>
</head>
<body>
  <main>
    <div class="code">404 — Not Found</div>
    <h1>That page isn't here.</h1>
    <p>The link may be broken, or the page may have moved. Try one of these instead.</p>
    <div class="links">
      <a class="btn primary" href="/">Home</a>
      <a class="btn" href="/our-services">Services</a>
      <a class="btn" href="/blog">Blog</a>
      <a class="btn" href="/contact">Contact</a>
    </div>
    <div class="tag">Quod Tango Muto — What we touch, we change.</div>
  </main>
</body>
</html>
