<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Thank you — Cognis Group</title>
<meta name="description" content="Thanks for reaching out to Cognis Group. We'll respond within one business day.">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preload" href="/framer-runtime/fonts/PlusJakartaSans-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/framer-runtime/fonts/PlusJakartaSans-Bold.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: "Plus Jakarta Sans";
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("/framer-runtime/fonts/PlusJakartaSans-Regular.woff2") format("woff2");
  }
  @font-face {
    font-family: "Plus Jakarta Sans";
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url("/framer-runtime/fonts/PlusJakartaSans-Bold.woff2") format("woff2");
  }
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    padding: 0;
    background: #0A0A0A;
    color: #F5F5F5;
    font-family: "Plus Jakarta Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  main {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .card {
    max-width: 560px;
    width: 100%;
    text-align: left;
  }
  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8E8E8E;
    margin: 0 0 24px;
  }
  h1 {
    font-weight: 700;
    font-size: clamp(32px, 5vw, 48px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 20px;
  }
  p {
    font-size: 17px;
    line-height: 1.6;
    color: #B8B8B8;
    margin: 0 0 32px;
  }
  a.back {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: #0A0A0A;
    background: #C7F24C;
    padding: 14px 22px;
    border-radius: 999px;
    text-decoration: none;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  a.back:hover { background: #B4E03A; transform: translateY(-1px); }
  .motto {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid #1F1F1F;
    font-size: 13px;
    color: #6E6E6E;
    font-style: italic;
  }
</style>
</head>
<body>
<main>
  <div class="card">
    <p class="eyebrow">Cognis Group</p>
    <h1>Message received.</h1>
    <p>Thanks for reaching out. We'll be back in touch shortly. For urgent matters, reach us directly at <a href="mailto:hello@cognis.group" style="color:#C7F24C;text-decoration:none;">hello@cognis.group</a>.</p>
    <a class="back" href="/">← Back to cognis.group</a>
    <p class="motto">Quod Tango Muto — what we touch, we change.</p>
  </div>
</main>
</body>
</html>
