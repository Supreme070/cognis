name: Deploy to Cloudflare Pages

# The committed repo root is the final, pre-rendered artifact (run `npm run
# prerender` locally before committing). This workflow does NOT re-build — it
# assembles a clean dist/ of the static files and uploads it to the existing
# Cloudflare Pages project `cognis`, which serves www.cognis.group.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for Cloudflare credentials
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping deploy. Add them in repo Settings → Secrets and variables → Actions to enable auto-deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble static site (exclude build/internal files)
        if: steps.check.outputs.configured == 'true'
        run: |
          mkdir -p dist
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='scripts' \
            --exclude='deploy' \
            --exclude='tests' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='*.md' \
            --exclude='cognis_base.html' \
            --exclude='*.before-final-copy' \
            --exclude='*.original.html' \
            ./ dist/
          echo "Files to deploy: $(find dist -type f | wc -l)"

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cognis --branch=main
