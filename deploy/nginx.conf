user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # MIME overrides
  types {
    application/javascript mjs;
    application/manifest+json webmanifest;
    image/avif avif;
    image/webp webp;
    font/woff2 woff2;
  }

  charset utf-8;
  charset_types text/css text/plain text/javascript application/javascript application/json application/xml image/svg+xml;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  server_tokens off;

  # Logs
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # Gzip pre-compressed (brotli_static requires the module; fall back gracefully)
  gzip_static on;
  gzip_vary on;

  # Runtime compression as fallback
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml application/rss+xml
    application/manifest+json image/svg+xml font/ttf font/otf;

  # Security: global map for redirecting www -> apex
  map $host $redirect_to_apex {
    default                0;
    "www.cognis.group"     1;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name cognis.group www.cognis.group _;

    root /var/www/cognis;
    index index.html;

    # www -> apex redirect (Traefik terminates TLS, so we redirect via HTTP)
    if ($redirect_to_apex) {
      return 301 https://cognis.group$request_uri;
    }

    # Security headers — apply to every response
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' https://api.web3forms.com; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com; upgrade-insecure-requests" always;

    # Health check for Coolify/Traefik
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Immutable assets — long cache
    location ~* ^/framer-runtime/.+\.(mjs|js|css|woff2|woff|ttf|otf|png|jpg|jpeg|webp|avif|svg|gif)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-Content-Type-Options "nosniff" always;
      try_files $uri =404;
    }

    # CMS chunks — medium cache, but revalidate
    location ~* ^/cognis-cms/.+\.framercms$ {
      expires 1h;
      add_header Cache-Control "public, max-age=3600, must-revalidate" always;
      add_header X-Content-Type-Options "nosniff" always;
      types { } default_type application/octet-stream;
      try_files $uri =404;
    }

    # Favicons, manifest, og image
    location ~* ^/(favicon.*\.(ico|png|svg)|apple-touch-icon\.png|site\.webmanifest|og/.*\.(jpg|png))$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800" always;
      try_files $uri =404;
    }

    # LLM/SEO text files — short cache, no archive
    location ~* ^/(llms|llms-full|robots)\.txt$ {
      expires 1h;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Robots-Tag "noarchive" always;
      default_type text/plain;
      try_files $uri =404;
    }

    location = /sitemap.xml {
      expires 1h;
      add_header Cache-Control "public, max-age=3600" always;
      default_type application/xml;
      try_files $uri =404;
    }

    # thanks.html — noindex
    location = /thanks.html {
      add_header X-Robots-Tag "noindex, nofollow" always;
      add_header Cache-Control "public, max-age=300, must-revalidate" always;
      try_files $uri =404;
    }

    # HTML — short cache, must revalidate
    location ~* \.html$ {
      add_header Cache-Control "public, max-age=300, must-revalidate" always;
      try_files $uri =404;
    }

    # Root
    location = / {
      add_header Cache-Control "public, max-age=300, must-revalidate" always;
      try_files /index.html =404;
    }

    # Block hidden files
    location ~ /\.(?!well-known) {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Default fallthrough
    location / {
      try_files $uri $uri/ =404;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html { internal; }
  }
}
